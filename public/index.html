  <body>
    <div class="loader-parent">
      <div class="loader-container">
        <div class="loader"></div>
        <div class="title"></div>
        <div class="progress-container">
          <div id="ai-progress-bar"></div>
        </div>
      </div>
    </div>

    <div id="ai-write-modal" class="modal-overlay" style="display: none">
      <div class="modal-box ai-modal-box">
        <button class="modal-close-btn" id="ai-write-close">&times;</button>
        <h3 class="modal-title"><i class="fas fa-robot"></i> AI Write Code</h3>
        <p class="modal-subtitle" id="ai-write-subtitle">
          Describe the C++ program you want to create
        </p>
        <form id="ai-write-form">
          <textarea
            id="ai-write-prompt"
            placeholder="e.g., Write a program to..."
            rows="4"
            maxlength="500"
            required
          ></textarea>
          <div class="ai-prompt-footer">
            <span id="ai-char-count">0/500</span>
          </div>
          <button
            type="submit"
            class="auth-submit-btn ai-submit-btn"
            id="ai-write-submit"
          >
            <i class="fas fa-wand-magic-sparkles"></i> Generate Code
          </button>
        </form>
      </div>
    </div>

    <div class="brand-topbar">
      <a href="/" class="compiler-brand" title="Go to Home">
        <div class="compiler-brand-mark"><i class="fas fa-code"></i></div>
        <div class="compiler-brand-text">
          <span class="compiler-brand-name">CompileAny</span>
          <span class="compiler-brand-subtitle" id="brand-lang-subtitle"
            >Online Compiler</span
          >
        </div>
      </a>
      <button
        class="mode brand-theme-toggle"
        style="margin-left: auto"
        title="Toggle Light/Dark Mode"
      >
        <i class="fa-solid fa-sun"></i>
      </button>
    </div>

    <nav class="flex justify-between items-center p-2">
      <div class="flex">
        <div
          class="file-name btn btn-secondary"
          title="Current File (click name to rename)"
        >
          <i class="fas fa-file-code"></i>
          <span
            class="truncate"
            contenteditable="true"
            spellcheck="false"
          ></span>
        </div>
        <div class="output-btn btn btn-secondary" title="Toggle Output">
          <span>Output</span>
        </div>
      </div>
      <div class="btn-large flex">
        <button class="run-code btn btn-primary" title="Run Code (Ctrl+Enter)">
          <i class="fas fa-play"></i>
          <span>Run</span>
        </button>
      </div>
      <div class="btn-con">
        <div class="btn-con-inner">
          <button
            class="run-code btn btn-primary"
            title="Run Code (Ctrl+Enter)"
          >
            <i class="fas fa-play"></i>
            <span>Run</span>
          </button>
          <button id="ai-write-btn" class="btn btn-ai" title="AI Write Code">
            <i class="fas fa-wand-magic-sparkles"></i>
            <span class="hidden-mobile">AI Write</span>
          </button>
          <button class="open-model btn btn-secondary" title="Share Code">
            <i class="fa-solid fa-share-nodes"></i>
            <span class="hidden-mobile">Share</span>
          </button>
          <button
            id="toggle-view"
            class="hide-toggle btn btn-secondary"
            title="Switch View"
          >
            <i class="fas fa-exchange-alt"></i>
            <span>Switch</span>
          </button>
          <div class="mobile-context-actions">
            <button class="btn btn-secondary" data-action="new">
              <i class="fas fa-file-circle-plus"></i>
              <span>New</span>
            </button>
            <button class="btn btn-secondary" data-action="clear">
              <i class="fas fa-eraser"></i>
              <span>Clear</span>
            </button>
            <button class="btn btn-secondary" data-action="copy">
              <i class="fas fa-copy"></i>
              <span>Copy</span>
            </button>
            <button class="btn btn-secondary" data-action="paste">
              <i class="fas fa-paste"></i>
              <span>Paste</span>
            </button>
            <button class="btn btn-secondary" data-action="save">
              <i class="fas fa-floppy-disk"></i>
              <span>Save</span>
            </button>
            <button class="btn btn-secondary" data-action="autosave">
              <i class="fas fa-toggle-off"></i>
              <span>Auto Save</span>
            </button>
            <button class="btn btn-secondary" data-action="import">
              <i class="fas fa-file-import"></i>
              <span>Import File</span>
            </button>
            <button class="btn btn-secondary" data-action="download">
              <i class="fas fa-download"></i>
              <span>Download</span>
            </button>
          </div>
          <span class="hidden-mobile1">Theme</span>
          <select
            name="select"
            id="theme-selector"
            class="btn"
            title="Select Editor Theme"
          ></select>
        </div>
      </div>
      <div class="nav-right-group">
        <button id="menu-toggle" class="hamburger" title="Menu">
          <i class="fas fa-bars"></i>
        </button>
      </div>
    </nav>
    <div id="top-progress-container">
      <div id="top-progress-bar"></div>
    </div>
    <div class="ai-status-overlay" id="ai-status-overlay">
      <i class="fas fa-stopwatch"></i>
      <span id="ai-status-text">AI is thinking...</span>
      <span id="ai-status-timer"></span>
    </div>
    <div class="main-container">
      <aside id="language-sidebar" class="sidebar">
        <ul class="sidebar-list"></ul>
      </aside>
      <div class="blur"></div>
      <div
        id="editorContainer"
        class="editor-container transition-width transition-height w-full h-full"
      >
        <textarea id="code" class="hidden"></textarea>
      </div>
      <div class="dragbar">
        <div id="dragbar"></div>
      </div>
      <div
        id="outputContainer"
        class="output-container transition-width transition-height w-full h-full"
      >
        <div id="output"></div>
        <iframe
          id="html-preview"
          sandbox="allow-scripts allow-forms allow-modals"
          style="
            display: none;
            width: 100%;
            height: 100%;
            border-radius: 0;
            background: #fff;
          "
          title="HTML Preview"
        ></iframe>
        <div id="sql-results" style="display: none"></div>
        <div class="btn-ab">
          <button
            id="ai-fix-btn"
            class="btn btn-ai-fix"
            style="display: none"
            title="AI Fix Code"
          >
            <i class="fas fa-wand-magic-sparkles"></i>
            <span>AI Fix</span>
          </button>
        </div>
      </div>
    </div>
    <div id="editor-context-menu" class="context-menu">
      <button class="context-menu-item" data-action="run">
        <i class="fas fa-play"></i> Run Code
        <span class="context-menu-shortcut">Ctrl+Enter</span>
      </button>
      <div class="context-menu-divider"></div>
      <button class="context-menu-item" data-action="new">
        <i class="fas fa-file-circle-plus"></i> New
        <span class="context-menu-shortcut">Alt+N</span>
      </button>
      <button class="context-menu-item" data-action="copy">
        <i class="fas fa-copy"></i> Copy
        <span class="context-menu-shortcut">Ctrl+C</span>
      </button>
      <button class="context-menu-item" data-action="paste">
        <i class="fas fa-paste"></i> Paste
        <span class="context-menu-shortcut">Ctrl+V</span>
      </button>
      <div class="context-menu-divider"></div>
      <button class="context-menu-item" data-action="save">
        <i class="fas fa-floppy-disk"></i> Save
        <span class="context-menu-shortcut">Ctrl+S</span>
      </button>
      <button class="context-menu-item" data-action="autosave">
        <i class="fas fa-toggle-off"></i> Auto Save
        <span class="context-menu-shortcut" id="autosave-state">Off</span>
      </button>
      <div class="context-menu-divider"></div>
      <button class="context-menu-item context-menu-danger" data-action="clear">
        <i class="fas fa-eraser"></i> Clear
        <span class="context-menu-shortcut">Alt+Del</span>
      </button>
      <div class="context-menu-divider"></div>
      <button class="context-menu-item" data-action="import">
        <i class="fas fa-file-import"></i> Import File
        <span class="context-menu-shortcut">Ctrl+O</span>
      </button>
      <button class="context-menu-item" data-action="download">
        <i class="fas fa-download"></i> Download
        <span class="context-menu-shortcut">Ctrl+Shift+S</span>
      </button>
    </div>
    <input
      type="file"
      id="import-file-input"
      accept=".cpp,.cc,.c,.h,.hpp,.java,.py,.js,.mjs,.ts,.go,.kt,.kts,.rb,.php,.sh,.rs,.cs,.pl,.lua,.r,.html,.htm,.sql,.txt"
      style="display: none"
    />
    <div class="status-bar">
      <div class="flex">
        <div class="status-item" title="Language">
          <i class="fas fa-code-branch"></i>
          <span id="status-language">C++</span>
        </div>
        <div class="status-item" title="Server Status">
          <i class="fas fa-server"></i>
          <span>Connected</span>
        </div>
        <div class="status-item cursor-pos" title="Cursor Position">
          <i class="fas fa-text-cursor"></i>
          <span id="cursor-position">Ln 1, Col 1</span>
        </div>
      </div>
      <div class="flex">
        <div class="status-item timer-group">
          <button id="timer-toggle" class="timer-btn" title="Start/Pause Timer">
            <i class="fas fa-stopwatch"></i>
          </button>
          <span id="practice-timer">00:00</span>
          <button
            id="timer-reset"
            class="timer-btn timer-reset-btn"
            title="Reset Timer"
          >
            <i class="fas fa-redo-alt"></i>
          </button>
        </div>
        <div class="status-item" title="Execution Time">
          <i class="fas fa-clock"></i>
          <span id="execution-time">0.00s</span>
        </div>
      </div>
    </div>
    <script src="/script.min.js"></script>
  </body>
